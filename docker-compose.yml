version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    ports: ["8000:8000"]
    env_file: .env
    environment:
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/adc.json
    volumes:
      # 1. Mount credentials (read-only)
      - ~/.config/gcloud/application_default_credentials.json:/app/adc.json:ro
      # 2. Hot-reload: Map local folder to container folder
      - ./backend:/app/backend

  frontend:
    build: 
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports: ["3000:3000"]
    volumes:
      # Hot-reload: Map local folder to container folder
      - ./frontend:/app
      # Use named volume for node_modules to preserve container's packages
      - frontend_node_modules:/app/node_modules
    environment:
      - API_URL=http://backend:8000
    depends_on: [backend]

volumes:
  frontend_node_modules: